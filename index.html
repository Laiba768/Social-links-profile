<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link
      href="https://googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <div class="profile-container">
        <div class="profile-info">
          <div class="pic">
            <img src="assets/images/avatar-jessica.jpeg" alt="User-image" />
          </div>
          <div class="user-info">
            <h1>Jessica Randall</h1>
            <span class="loc"><b>London, United Kingdom</b></span>
          </div>
          <p class="user-field">"Front-end developer and avid reader."</p>
          <div class="social-btns">
            <button type="button">GitHub</button>
            <button type="button">Frontend Mentor</button>
            <button type="button">LinkedIn</button>
            <button type="button">Twitter</button>
            <button type="button">Instagram</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
